<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Ball background -->
  <circle cx="64" cy="64" r="60" fill="#e8a838"/>
  <circle cx="64" cy="64" r="60" fill="url(#ball-gradient)"/>
  
  <!-- Inner circle -->
  <circle cx="64" cy="64" r="48" fill="#f5f0e8"/>
  
  <!-- Letter B -->
  <text x="64" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="56" fill="#e07850">B</text>
  
  <!-- Shine highlight -->
  <ellipse cx="48" cy="40" rx="16" ry="10" fill="white" opacity="0.4" transform="rotate(-20 48 40)"/>
  
  <defs>
    <radialGradient id="ball-gradient" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ecb442"/>
      <stop offset="100%" stop-color="#c48a28"/>
    </radialGradient>
  </defs>
</svg>
